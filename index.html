<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="https://static.vecteezy.com/system/resources/previews/041/165/835/non_2x/golden-and-red-fortune-wheel-spin-machine-with-set-icons-casino-banner-design-element-for-ui-png.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel - Putar & Menang!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            overflow-x: hidden;
            position: relative;
        }

        /* Smooth Solid Background - Abu-abu */
        .animated-background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #2a2a2a 0%, #1a1a1a 50%, #0a0a0a 100%);
            z-index: 0;
        }

        /* Aurora Effect - Silver/Grey */
        .aurora-container {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
            pointer-events: none;
        }

        .aurora {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, 
                transparent 0%,
                rgba(180, 180, 180, 0.25) 25%,
                rgba(220, 220, 220, 0.3) 50%,
                rgba(180, 180, 180, 0.25) 75%,
                transparent 100%
            );
            animation: aurora 10s ease-in-out infinite;
        }

        .aurora-1 { animation-delay: 0s; transform: rotate(0deg); }
        .aurora-2 { animation-delay: 3s; transform: rotate(120deg); }
        .aurora-3 { animation-delay: 6s; transform: rotate(240deg); }

        @keyframes aurora {
            0%, 100% {
                opacity: 0.3;
                transform: translateY(0) scale(1) rotate(var(--rotation, 0deg));
            }
            50% {
                opacity: 0.6;
                transform: translateY(-40px) scale(1.15) rotate(var(--rotation, 0deg));
            }
        }

        /* Star/Diamond Rain (menggantikan ketupat & bulan sabit) */
        .star-rain {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .star-particle {
            position: absolute;
            opacity: 0.7;
            animation: starFall linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
            color: #fbbf24;
            font-size: 22px;
        }

        @keyframes starFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Enhanced Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 4;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.9);
            border-radius: 50%;
            animation: float linear infinite;
            bottom: -10px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.9);
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Particle Trail Container */
        .particle-trail-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .trail-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fbbf24, transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: trailFade 0.8s ease-out forwards;
        }

        @keyframes trailFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out;
            transform-style: preserve-3d;
        }

        .logo-image {
            max-width: 400px;
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.6));
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #d1d5db;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(251, 191, 36, 0.8)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Wheel Container with 3D Tilt */
        .wheel-wrapper {
            position: relative;
            margin-bottom: 40px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .wheel-wrapper:hover { transform: rotateX(5deg) rotateY(5deg); }

        /* Multi-layer Glow */
        .wheel-glow {
            position: absolute;
            inset: -70px;
            background: radial-gradient(circle, 
                rgba(180, 180, 180, 0.3) 0%, 
                rgba(255, 235, 0, 0.2) 30%,
                transparent 70%);
            filter: blur(40px);
            animation: wheelGlowPulse 3s ease-in-out infinite;
        }

        @keyframes wheelGlowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Animated Running Light Border */
        .running-lights {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            z-index: 1;
        }

        .running-lights::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #aaaaaa, transparent, #cccccc, transparent, #aaaaaa);
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: runningLight 2s linear infinite;
            filter: blur(2px) brightness(1.5);
        }

        @keyframes runningLight {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        /* Pointer */
        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.8));
        }

        .pointer-triangle {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #fbbf24;
            animation: pointerBounce 1s ease-in-out infinite;
        }

        @keyframes pointerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .pointer-circle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #fbbf24, #f59e0b);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(251, 191, 36, 1);
            animation: pointerGlow 1s ease-in-out infinite;
        }

        @keyframes pointerGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(251, 191, 36, 1); }
            50% { box-shadow: 0 0 40px rgba(251, 191, 36, 1), 0 0 60px rgba(251, 191, 36, 0.5); }
        }

        /* Wheel */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            transform-style: preserve-3d;
            transform: translateZ(50px);
        }

        .wheel {
            width: 100%;
            height: 100%;
            transition: none;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
        }

        .wheel.spinning {
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Center Circle */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #fde68a 0%, #d97706 100%);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(251, 191, 36, 0.6);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fef3c7;
        }

        .center-circle-inner {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);
            border-radius: 50%;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Glassmorphism User ID Form */
        .user-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-out;
            max-width: 400px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .user-form::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%);
            animation: glassShine 6s linear infinite;
        }

        @keyframes glassShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-label {
            display: block;
            color: #d1d5db;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            position: relative;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.125rem;
            border: 2px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
            outline: none;
            position: relative;
            z-index: 1;
        }

        .form-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .form-input:focus {
            border-color: #fbbf24;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4), 0 0 40px rgba(251, 191, 36, 0.2);
            animation: inputGlow 1.5s ease-in-out infinite;
        }

        @keyframes inputGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4), 0 0 40px rgba(251, 191, 36, 0.2); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.6), 0 0 60px rgba(251, 191, 36, 0.3); }
        }

        /* Spin Button */
        .spin-button {
            padding: 20px 48px;
            font-size: 1.5rem;
            font-weight: bold;
            color: rgb(255, 255, 255);
            background: linear-gradient(to bottom, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b45309, 0 12px 20px rgba(0, 0, 0, 0.4), 0 0 40px rgba(251, 191, 36, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.1s;
            position: relative;
            transform: translateY(0);
            animation: buttonPulse 2s ease-in-out infinite;
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 8px 0 #b45309, 0 12px 20px rgba(0,0,0,0.4), 0 0 40px rgba(251,191,36,0.3), inset 0 2px 0 rgba(255,255,255,0.3); transform: translateY(0); }
            50% { box-shadow: 0 8px 0 #b45309, 0 12px 20px rgba(0,0,0,0.4), 0 0 60px rgba(251,191,36,0.6), 0 0 80px rgba(251,191,36,0.3), inset 0 2px 0 rgba(255,255,255,0.3); transform: translateY(-4px); }
        }

        .spin-button:hover:not(:disabled) {
            box-shadow: 0 8px 0 #b45309, 0 15px 30px rgba(0,0,0,0.5), 0 0 70px rgba(251,191,36,0.7), 0 0 100px rgba(251,191,36,0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            animation: none;
        }

        .spin-button:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b45309, 0 6px 10px rgba(0,0,0,0.4), 0 0 30px rgba(251,191,36,0.2), inset 0 2px 0 rgba(255,255,255,0.3);
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: linear-gradient(to bottom, #9ca3af 0%, #6b7280 50%, #4b5563 100%);
            box-shadow: 0 8px 0 #374151, 0 12px 20px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.2);
            animation: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: rgba(251, 191, 36, 0.15);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 100px rgba(251,191,36,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: modalShine 8s linear infinite;
        }

        @keyframes modalShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
            animation: modalBounce 0.5s ease;
        }

        @keyframes modalBounce {
            0% { transform: scale(0.5) translateY(-100px); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        .modal-confetti {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            animation: confettiFall 1s ease-out;
            z-index: 1;
        }

        @keyframes confettiFall {
            0% { transform: translateX(-50%) translateY(-100px) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(-50%) translateY(0) rotate(360deg); opacity: 1; }
        }

        .modal-title {
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4), 0 0 30px rgba(251,191,36,0.6);
            position: relative;
            z-index: 1;
        }

        .modal-prize {
            font-size: 4.5rem;
            font-weight: bold;
            color: white;
            margin: 20px 0;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.8);
            animation: modalPrizeGlow 1.5s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes modalPrizeGlow {
            0%, 100% { text-shadow: 4px 4px 8px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.8), 0 0 60px rgba(251,191,36,0.6); }
            50% { text-shadow: 4px 4px 8px rgba(0,0,0,0.5), 0 0 60px rgba(255,255,255,1), 0 0 100px rgba(251,191,36,0.8); }
        }

        .modal-message { font-size: 1.25rem; color: #fef3c7; margin-bottom: 10px; font-weight: 600; position: relative; z-index: 1; }
        .modal-userid { font-size: 1rem; color: rgba(255,255,255,0.9); margin-bottom: 30px; position: relative; z-index: 1; }

        .claim-button {
            padding: 18px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #10b981 0%, #059669 50%, #047857 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #065f46, 0 12px 25px rgba(0,0,0,0.5), 0 0 40px rgba(16,185,129,0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
            position: relative;
            z-index: 1;
            animation: claimPulse 2s ease-in-out infinite;
        }

        @keyframes claimPulse {
            0%, 100% { box-shadow: 0 8px 0 #065f46, 0 12px 25px rgba(0,0,0,0.5), 0 0 40px rgba(16,185,129,0.4), inset 0 2px 0 rgba(255,255,255,0.3); }
            50% { box-shadow: 0 8px 0 #065f46, 0 12px 25px rgba(0,0,0,0.5), 0 0 60px rgba(16,185,129,0.7), 0 0 80px rgba(16,185,129,0.4), inset 0 2px 0 rgba(255,255,255,0.3); }
        }

        .claim-button:hover { box-shadow: 0 8px 0 #065f46, 0 15px 35px rgba(0,0,0,0.6), 0 0 80px rgba(16,185,129,0.8), inset 0 2px 0 rgba(255,255,255,0.3); transform: translateY(-2px); animation: none; }
        .claim-button:active { transform: translateY(6px); }

        /* Confetti */
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }

        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            background: #fbbf24;
            top: -10px;
            opacity: 0;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti-piece:nth-child(odd) { background: #ef4444; }
        .confetti-piece:nth-child(3n) { background: #10b981; }
        .confetti-piece:nth-child(4n) { background: #3b82f6; }
        .confetti-piece:nth-child(5n) { background: #ec4899; }

        /* Camera Shake */
        @keyframes cameraShake {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            10% { transform: translate(-10px,5px) rotate(-1deg); }
            20% { transform: translate(10px,-5px) rotate(1deg); }
            30% { transform: translate(-10px,-10px) rotate(-1deg); }
            40% { transform: translate(10px,5px) rotate(1deg); }
            50% { transform: translate(-5px,10px) rotate(-1deg); }
            60% { transform: translate(5px,-5px) rotate(1deg); }
            70% { transform: translate(-10px,5px) rotate(-1deg); }
            80% { transform: translate(10px,-10px) rotate(1deg); }
            90% { transform: translate(-5px,5px) rotate(-1deg); }
        }

        body.shake { animation: cameraShake 0.5s ease-in-out; }

        /* Spotlight */
        .spotlight {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            animation: spotlightPulse 2s ease-in-out infinite;
        }

        .spotlight.active { opacity: 1; }

        @keyframes spotlightPulse {
            0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
        }

        .light-beam {
            position: fixed;
            top: -100%; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 200%;
            background: linear-gradient(to bottom, rgba(255,215,0,0) 0%, rgba(255,215,0,0.6) 50%, rgba(255,215,0,0) 100%);
            pointer-events: none;
            z-index: 998;
            opacity: 0;
            filter: blur(20px);
        }

        .light-beam.active { animation: beamDown 1s ease-out forwards; }

        @keyframes beamDown {
            0% { top: -100%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 0%; opacity: 0.8; }
        }

        /* Wheel glow tiers */
        .wheel-glow.tier-bronze { background: radial-gradient(circle, rgba(205,127,50,0.5) 0%, rgba(184,115,51,0.3) 30%, transparent 70%); }
        .wheel-glow.tier-silver { background: radial-gradient(circle, rgba(192,192,192,0.5) 0%, rgba(169,169,169,0.3) 30%, transparent 70%); }
        .wheel-glow.tier-gold { background: radial-gradient(circle, rgba(255,215,0,0.6) 0%, rgba(255,193,7,0.4) 30%, transparent 70%); }
        .wheel-glow.tier-diamond { background: radial-gradient(circle, rgba(0,191,255,0.6) 0%, rgba(138,43,226,0.4) 30%, transparent 70%); }

        /* History Panel */
        .history-panel {
            position: fixed;
            right: 20px; top: 50%;
            transform: translateY(-50%);
            width: 320px; max-height: 500px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 100;
            overflow: hidden;
        }

        .history-title { font-size: 1.25rem; font-weight: bold; color: #fbbf24; text-align: center; margin-bottom: 15px; text-shadow: 0 0 10px rgba(251,191,36,0.5); }

        .history-list { max-height: 400px; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }

        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.5); border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb:hover { background: rgba(251,191,36,0.7); }

        .history-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            animation: slideInRight 0.5s ease-out;
            transition: all 0.3s;
        }

        .history-item:hover { background: rgba(255,255,255,0.12); transform: translateX(-5px); }

        .history-item.current-user {
            background: linear-gradient(135deg, rgba(251,191,36,0.3), rgba(245,158,11,0.2));
            border: 2px solid rgba(251,191,36,0.6);
            box-shadow: 0 0 20px rgba(251,191,36,0.3);
        }

        .history-item.current-user .history-user { color: #fbbf24; font-weight: bold; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-user { font-size: 0.95rem; color: #ffffff; font-weight: 600; margin-bottom: 5px; }
        .history-prize { font-size: 1.1rem; color: #10b981; font-weight: bold; }
        .history-time { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 3px; }

        @media (max-width: 768px) {
            .history-panel { position: relative; right: auto; top: auto; transform: none; width: 100%; max-width: 400px; margin: 20px auto; max-height: 300px; }
            .logo-image { max-width: 280px; }
            .subtitle { font-size: 1.125rem; }
            .wheel-container { width: 350px; height: 350px; }
            .spin-button { padding: 16px 36px; font-size: 1.25rem; }
            .user-form { padding: 20px 30px; }
            .modal-content { padding: 40px 30px; }
            .modal-title { font-size: 2rem; }
            .modal-prize { font-size: 3rem; }
            .claim-button { padding: 15px 40px; font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="animated-background"></div>

    <div class="aurora-container">
        <div class="aurora aurora-1" style="--rotation: 0deg;"></div>
        <div class="aurora aurora-2" style="--rotation: 120deg;"></div>
        <div class="aurora aurora-3" style="--rotation: 240deg;"></div>
    </div>

    <!-- Star Rain (pengganti ketupat & bulan sabit) -->
    <div class="star-rain" id="starRain"></div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Lucky Wheel Logo" class="logo-image">
            <p class="subtitle">
                <span>✦</span>
                SPIN RODANYA & MENANGKAN HADIAH FANTASTIS SAMPAI DENGAN 2JT!
                <span>✦</span>
            </p>
        </div>

        <div class="wheel-wrapper">
            <div class="wheel-glow"></div>
            <div class="running-lights"></div>

            <div class="pointer">
                <div class="pointer-triangle"></div>
                <div class="pointer-circle"></div>
            </div>

            <div class="wheel-container">
                <div class="particle-trail-container" id="particleTrail"></div>

                <svg class="wheel" id="wheel" viewBox="0 0 400 400">
                    <defs>
                        <filter id="segment-glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="5" result="blur1"/>
                            <feGaussianBlur stdDeviation="3" result="blur2"/>
                            <feMerge>
                                <feMergeNode in="blur1"/>
                                <feMergeNode in="blur2"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:transparent;stop-opacity:0" />
                            <stop offset="50%" style="stop-color:white;stop-opacity:0.6" />
                            <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
                            <animate attributeName="x1" values="-100%;100%" dur="2s" repeatCount="indefinite" />
                            <animate attributeName="x2" values="0%;200%" dur="2s" repeatCount="indefinite" />
                        </linearGradient>
                    </defs>
                </svg>

                <div class="center-circle">
                    <div class="center-circle-inner"></div>
                </div>
            </div>
        </div>

        <div class="user-form">
            <label class="form-label" for="userId">🔎 Masukkan User ID</label>
            <input type="text" id="userId" class="form-input" placeholder="Contoh: USER12345" maxlength="20" />
        </div>

        <button class="spin-button" id="spinButton" disabled>
            🔒 MASUKKAN USER ID DULU
        </button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-confetti">🎊</div>
            <h2 class="modal-title">🎉 SELAMAT! 🎉</h2>
            <div class="modal-prize" id="modalPrize">1JT</div>
            <p class="modal-message">Kamu Mendapatkan Hadiah!</p>
            <p class="modal-userid" id="modalUserId">User ID: USER12345</p>
            <a href="https://parlaybow.com" class="claim-button" id="claimButton">
                💎 CLAIM SEKARANG
            </a>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>
    <div class="spotlight" id="spotlight"></div>
    <div class="light-beam" id="lightBeam"></div>

    <div class="history-panel">
        <div class="history-title">🏆 Pemenang Terbaru</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="assets/backsound lebaran.mp3" type="audio/mpeg">
    </audio>
    <audio id="spinSound" preload="auto">
        <source src="assets/pop sound.mp3" type="audio/mpeg">
    </audio>
    <audio id="wheelSpinningSound" preload="auto">
        <source src="assets/SPIN EFFECT.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound" preload="auto">
        <source src="assets/yeyy.mp3" type="audio/mpeg">
    </audio>

    <script>
        const LOGO_IMAGE_URL = 'logo.png';
        const CLAIM_LINK_URL = 'https://siulbaik.com';

        const AUDIO_CONFIG = {
            backgroundMusic: 'assets/backsound lebaran.mp3',
            spinSound: 'assets/pop sound.mp3',
            wheelSpinningSound: 'assets/SPIN EFFECT.mp3',
            winSound: 'assets/yeyy.mp3',
            bgMusicVolume: 0.3,
            spinVolume: 0.5,
            wheelSpinningVolume: 0.6,
            winVolume: 0.7,
            fadeInDuration: 2.0,
            fadeOutDuration: 1.5
        };

        const segments = [
            { value: '250.000', color: '#1a1a1a', label: '250RB', tier: 'bronze' },
            { value: '500.000', color: '#555555', label: '500RB', tier: 'silver' },
            { value: '1.000.000', color: '#1a1a1a', label: '1JT', tier: 'gold' },
            { value: '2.000.000', color: '#555555', label: '2JT', tier: 'diamond' },
        ];

        const tierColors = {
            bronze: ['#cd7f32', '#b87333', '#a0522d'],
            silver: ['#c0c0c0', '#a9a9a9', '#808080'],
            gold: ['#ffd700', '#ffc107', '#ffab00'],
            diamond: ['#00bfff', '#1e90ff', '#8a2be2', '#ff69b4']
        };

        let currentRotation = 0;
        let isSpinning = false;
        let userIdValue = '';
        let trailInterval = null;
        let hasSpun = false;
        let historyInterval = null;

        function checkDeviceSpinStatus() {
            const spinData = localStorage.getItem('luckyWheelSpin');
            if (spinData) { hasSpun = true; return JSON.parse(spinData); }
            return null;
        }

        function saveSpinToDevice(userId, prize) {
            localStorage.setItem('luckyWheelSpin', JSON.stringify({ userId, prize, timestamp: new Date().toISOString() }));
        }

        function generateRandomUserId() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const numbers = '123456789';
            return letters[Math.floor(Math.random() * letters.length)] + '****' + numbers[Math.floor(Math.random() * numbers.length)];
        }

        function getRandomPrize() {
            return ['250.000', '500.000', '1.000.000', '2.000.000'][Math.floor(Math.random() * 4)];
        }

        function getTimeAgo(seconds) {
            if (seconds < 60) return 'Baru saja';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + ' menit lalu';
            return Math.floor(minutes / 60) + ' jam lalu';
        }

        function addHistoryItem(userId, prize, isCurrentUser = false, timeAgo = 'Baru saja') {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item' + (isCurrentUser ? ' current-user' : '');
            item.innerHTML = `<div class="history-user">🎮 ID: ${userId}</div><div class="history-prize">💰 Rp ${prize}</div><div class="history-time">⏰ ${timeAgo}</div>`;
            if (historyList.firstChild) historyList.insertBefore(item, historyList.firstChild);
            else historyList.appendChild(item);
            while (historyList.children.length > 20) historyList.removeChild(historyList.lastChild);
            if (isCurrentUser) historyList.scrollTop = 0;
        }

        function generateInitialHistory() {
            document.getElementById('historyList').innerHTML = '';
            for (let i = 0; i < 10; i++) addHistoryItem(generateRandomUserId(), getRandomPrize(), false, getTimeAgo(Math.floor(Math.random() * 3600)));
        }

        function startRandomHistoryGeneration() {
            historyInterval = setInterval(() => addHistoryItem(generateRandomUserId(), getRandomPrize(), false, 'Baru saja'), 5000);
        }

        const userIdInput = document.getElementById('userId');
        const spinButton = document.getElementById('spinButton');
        const modalOverlay = document.getElementById('modalOverlay');
        const claimButton = document.getElementById('claimButton');
        const wheelElement = document.getElementById('wheel');
        const wheelGlowElement = document.querySelector('.wheel-glow');
        const spotlightElement = document.getElementById('spotlight');
        const lightBeamElement = document.getElementById('lightBeam');
        const bgMusicElement = document.getElementById('bgMusic');
        const spinSoundElement = document.getElementById('spinSound');
        const wheelSpinningSoundElement = document.getElementById('wheelSpinningSound');
        const winSoundElement = document.getElementById('winSound');

        bgMusicElement.volume = 0;
        spinSoundElement.volume = AUDIO_CONFIG.spinVolume;
        wheelSpinningSoundElement.volume = AUDIO_CONFIG.wheelSpinningVolume;
        winSoundElement.volume = AUDIO_CONFIG.winVolume;

        let isBgMusicPlaying = false;
        let fadeInterval = null;

        document.querySelector('.logo-image').src = LOGO_IMAGE_URL;

        userIdInput.addEventListener('input', function() {
            userIdValue = this.value.trim();
            const previousSpin = checkDeviceSpinStatus();
            if (previousSpin) { spinButton.disabled = true; spinButton.textContent = '⛔ SUDAH PERNAH SPIN'; return; }
            if (userIdValue.length > 0) { spinButton.disabled = false; spinButton.textContent = '✨ PUTAR RODA ✨'; }
            else { spinButton.disabled = true; spinButton.textContent = '🔒 MASUKKAN USER ID DULU'; }
        });

        modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

        function fadeInBackgroundMusic() {
            if (isBgMusicPlaying) return;
            bgMusicElement.volume = 0;
            bgMusicElement.play().then(() => {
                isBgMusicPlaying = true;
                const fadeStep = AUDIO_CONFIG.bgMusicVolume / (AUDIO_CONFIG.fadeInDuration * 60);
                fadeInterval = setInterval(() => {
                    if (bgMusicElement.volume < AUDIO_CONFIG.bgMusicVolume) bgMusicElement.volume = Math.min(bgMusicElement.volume + fadeStep, AUDIO_CONFIG.bgMusicVolume);
                    else clearInterval(fadeInterval);
                }, 1000 / 60);
            }).catch(e => console.log('Audio play failed:', e));
        }

        function playSpinSound() { spinSoundElement.currentTime = 0; spinSoundElement.play().catch(e => {}); }
        function playWheelSpinningSound() { wheelSpinningSoundElement.currentTime = 0; wheelSpinningSoundElement.play().catch(e => {}); }
        function playWinSound() { winSoundElement.currentTime = 0; winSoundElement.play().catch(e => {}); }

        let musicStarted = false;
        document.addEventListener('click', function() { if (!musicStarted) { fadeInBackgroundMusic(); musicStarted = true; } }, { once: true });

        // Star rain (pengganti ketupat & bulan sabit)
        function createStarRain() {
            const container = document.getElementById('starRain');
            const symbols = ['✦', '✧', '★', '◆', '✺', '✵'];
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'star-particle';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (Math.random() * 3 + 5) + 's';
                el.style.animationDelay = Math.random() * 2 + 's';
                el.style.fontSize = (Math.random() * 16 + 14) + 'px';
                el.style.opacity = (Math.random() * 0.4 + 0.3).toString();
                container.appendChild(el);
                setTimeout(() => el.remove(), 8000);
            }, 800);
        }

        function drawWheel() {
            const svg = document.getElementById('wheel');
            const segmentAngle = 360 / segments.length;
            segments.forEach((segment, index) => {
                const startAngle = index * segmentAngle - 90;
                const endAngle = startAngle + segmentAngle;
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                const x1 = 200 + 180 * Math.cos(startRad), y1 = 200 + 180 * Math.sin(startRad);
                const x2 = 200 + 180 * Math.cos(endRad), y2 = 200 + 180 * Math.sin(endRad);
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M 200 200 L ${x1} ${y1} A 180 180 0 0 1 ${x2} ${y2} Z`);
                path.setAttribute('fill', segment.color);
                path.setAttribute('stroke', '#888888');
                path.setAttribute('stroke-width', '3');
                path.setAttribute('filter', 'url(#segment-glow)');
                svg.appendChild(path);
                const midAngle = (startAngle + endAngle) / 2;
                const midRad = (midAngle * Math.PI) / 180;
                const textX = 200 + 120 * Math.cos(midRad), textY = 200 + 120 * Math.sin(midRad);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX); text.setAttribute('y', textY);
                text.setAttribute('fill', '#ffffff'); text.setAttribute('font-size', '32');
                text.setAttribute('font-weight', 'bold'); text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('filter', 'url(#text-glow)');
                text.setAttribute('transform', `rotate(${midAngle + 90}, ${textX}, ${textY})`);
                text.textContent = segment.label;
                svg.appendChild(text);
                const shimmerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                shimmerText.setAttribute('x', textX); shimmerText.setAttribute('y', textY);
                shimmerText.setAttribute('fill', 'url(#shimmer)'); shimmerText.setAttribute('font-size', '32');
                shimmerText.setAttribute('font-weight', 'bold'); shimmerText.setAttribute('text-anchor', 'middle');
                shimmerText.setAttribute('dominant-baseline', 'middle');
                shimmerText.setAttribute('transform', `rotate(${midAngle + 90}, ${textX}, ${textY})`);
                shimmerText.textContent = segment.label;
                svg.appendChild(shimmerText);
            });
            const outerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            outerCircle.setAttribute('cx', '200'); outerCircle.setAttribute('cy', '200'); outerCircle.setAttribute('r', '185');
            outerCircle.setAttribute('fill', 'none'); outerCircle.setAttribute('stroke', '#aaaaaa'); outerCircle.setAttribute('stroke-width', '8');
            svg.appendChild(outerCircle);
            const innerBorder = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            innerBorder.setAttribute('cx', '200'); innerBorder.setAttribute('cy', '200'); innerBorder.setAttribute('r', '178');
            innerBorder.setAttribute('fill', 'none'); innerBorder.setAttribute('stroke', '#666666'); innerBorder.setAttribute('stroke-width', '2');
            svg.appendChild(innerBorder);
            for (let i = 0; i < segments.length; i++) {
                const dotAngle = (i * (360 / segments.length) - 90) * Math.PI / 180;
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('cx', 200 + 190 * Math.cos(dotAngle)); dot.setAttribute('cy', 200 + 190 * Math.sin(dotAngle));
                dot.setAttribute('r', '8'); dot.setAttribute('fill', '#FFD700'); dot.setAttribute('stroke', '#8B4513'); dot.setAttribute('stroke-width', '2');
                svg.appendChild(dot);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (3 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        function createParticleTrail() {
            if (!isSpinning) return;
            const trailContainer = document.getElementById('particleTrail');
            for (let i = 0; i < 3; i++) {
                const angle = (currentRotation + Math.random() * 360) * Math.PI / 180;
                const x = 225 + 170 * Math.cos(angle), y = 225 + 170 * Math.sin(angle);
                const particle = document.createElement('div');
                particle.className = 'trail-particle';
                particle.style.left = x + 'px'; particle.style.top = y + 'px';
                trailContainer.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        function createConfetti(tier = 'gold') {
            const container = document.getElementById('confettiContainer');
            const colors = tierColors[tier] || tierColors.gold;
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 10 + 5;
                confetti.style.width = size + 'px'; confetti.style.height = size + 'px';
                confetti.style.animationDelay = Math.random() * 0.3 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        function triggerCameraShake() { document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 500); }

        function triggerSpotlight() {
            spotlightElement.classList.add('active'); lightBeamElement.classList.add('active');
            setTimeout(() => { spotlightElement.classList.remove('active'); lightBeamElement.classList.remove('active'); }, 3000);
        }

        function changeWheelGlow(tier) {
            wheelGlowElement.classList.remove('tier-bronze', 'tier-silver', 'tier-gold', 'tier-diamond');
            wheelGlowElement.classList.add('tier-' + tier);
        }

        function spinWheel() {
            if (isSpinning || !userIdValue || hasSpun) return;
            isSpinning = true;
            const button = document.getElementById('spinButton');
            const wheel = document.getElementById('wheel');
            button.disabled = true;
            button.textContent = '🎡 BERPUTAR...';
            playSpinSound();
            setTimeout(() => playWheelSpinningSound(), 200);
            trailInterval = setInterval(createParticleTrail, 50);
            const spins = 5 + Math.random() * 5;
            const extraDegrees = Math.random() * 360;
            currentRotation += spins * 360 + extraDegrees;
            wheel.classList.add('spinning');
            wheel.style.transition = 'transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                wheel.style.transition = 'transform 1.5s cubic-bezier(0.25, 0.1, 0.25, 1)';
                wheel.style.transform = `rotate(${currentRotation}deg)`;
            }, 3000);
            setTimeout(() => {
                clearInterval(trailInterval);
                const finalRotation = currentRotation % 360;
                let angleAtPointer = (-90 - finalRotation) % 360;
                if (angleAtPointer < 0) angleAtPointer += 360;
                let segmentIndex;
                if ((angleAtPointer >= 270 && angleAtPointer < 360) || angleAtPointer === 0) segmentIndex = 0;
                else if (angleAtPointer > 0 && angleAtPointer < 90) segmentIndex = 1;
                else if (angleAtPointer >= 90 && angleAtPointer < 180) segmentIndex = 2;
                else segmentIndex = 3;
                const winningSegment = segments[segmentIndex];
                changeWheelGlow(winningSegment.tier);
                saveSpinToDevice(userIdValue, winningSegment.value);
                hasSpun = true;
                addHistoryItem(userIdValue, winningSegment.value, true, 'Baru saja');
                document.getElementById('modalPrize').textContent = winningSegment.value;
                document.getElementById('modalUserId').textContent = `User ID: ${userIdValue}`;
                claimButton.href = CLAIM_LINK_URL + '?prize=' + winningSegment.value + '&userid=' + userIdValue;
                if (winningSegment.tier === 'diamond' || winningSegment.tier === 'gold') { triggerCameraShake(); triggerSpotlight(); }
                playWinSound();
                createConfetti(winningSegment.tier);
                setTimeout(() => modalOverlay.classList.add('active'), 500);
                wheel.classList.remove('spinning');
                wheel.style.transition = 'none';
                button.disabled = true;
                button.textContent = '⛔ SUDAH PERNAH SPIN';
                isSpinning = false;
            }, 4500);
        }

        drawWheel();
        createParticles();
        createStarRain();
        spinButton.addEventListener('click', spinWheel);

        const previousSpin = checkDeviceSpinStatus();
        if (previousSpin) {
            hasSpun = true;
            spinButton.disabled = true; spinButton.textContent = '⛔ SUDAH PERNAH SPIN'; spinButton.style.cursor = 'not-allowed';
            userIdInput.disabled = true; userIdInput.value = previousSpin.userId; userIdInput.style.cursor = 'not-allowed';
            addHistoryItem(previousSpin.userId, previousSpin.prize, true, 'Spin kamu');
        }

        generateInitialHistory();
        startRandomHistoryGeneration();
    </script>
</body>
</html>
